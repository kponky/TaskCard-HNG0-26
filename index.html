<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A.E.A Task — Stage 1a</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="taskCard-container">
      <!-- HEADER -->
      <header class="header">
        <div class="brand">
          <div class="brand-logo" aria-hidden="true">AEA</div>
          <div class="brand-text">
            <h1>AEA Digitals</h1>
            <p>Task Manager · Stage 1a</p>
          </div>
        </div>
        <div class="header-right">
          <span class="task-count" id="taskCount" aria-live="polite"
            >3 tasks</span
          >
          <button
            class="btn-new"
            id="openModal"
            aria-label="Add new task"
            aria-haspopup="dialog"
          >
            <svg
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.8"
              stroke-linecap="round"
              aria-hidden="true"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            New Task
          </button>
        </div>
      </header>

      <!-- STATS -->
      <div class="stats-row" role="region" aria-label="Task statistics">
        <div class="stat-chip s-todo">
          <span class="stat-val" id="st-todo">0</span>
          <span class="stat-label">Pending</span>
        </div>
        <div class="stat-chip s-prog">
          <span class="stat-val" id="st-prog">0</span>
          <span class="stat-label">In Progress</span>
        </div>
        <div class="stat-chip s-done">
          <span class="stat-val" id="st-done">0</span>
          <span class="stat-label">Done</span>
        </div>
        <div class="stat-chip s-block">
          <span class="stat-val" id="st-block">0</span>
          <span class="stat-label">Blocked</span>
        </div>
      </div>

      <!-- FILTERS -->
      <div class="filter-row" role="group" aria-label="Filter tasks">
        <button class="fbtn active" data-filter="all">All</button>
        <button class="fbtn" data-filter="Pending">Pending</button>
        <button class="fbtn" data-filter="In Progress">In Progress</button>
        <button class="fbtn" data-filter="Done">Done</button>
        <button class="fbtn" data-filter="Blocked">Blocked</button>
      </div>

      <!-- CARDS -->
      <div
        class="card-list"
        id="cardList"
        role="list"
        aria-label="Task list"
      ></div>
      <div class="empty-state" id="emptyState" aria-live="polite">
        <svg
          width="42"
          height="42"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.4"
          aria-hidden="true"
        >
          <path d="M9 11l3 3L22 4" />
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
        </svg>
        No tasks here — hit <strong>New Task</strong> to get started!
      </div>
    </div>

    <!-- ADD TASK MODAL -->
    <div
      class="modal-bg"
      id="modalBg"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalHeading"
    >
      <div class="modal">
        <div class="modal-topbar"></div>
        <div class="modal-header">
          <h2 id="modalHeading">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <polygon
                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
              />
            </svg>
            New Task
          </h2>
          <button class="modal-close" id="closeModal" aria-label="Close dialog">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              aria-hidden="true"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <div class="field">
          <label for="f-title">Title *</label>
          <input
            type="text"
            id="f-title"
            placeholder="What needs to be done?"
            maxlength="100"
            autocomplete="off"
          />
        </div>

        <div class="field">
          <label for="f-desc">Description</label>
          <textarea
            id="f-desc"
            placeholder="Add more detail…"
            maxlength="600"
          ></textarea>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="f-priority">Priority</label>
            <select id="f-priority">
              <option value="Medium">Medium</option>
              <option value="High">High</option>
              <option value="Low">Low</option>
            </select>
          </div>
          <div class="field">
            <label for="f-status">Status</label>
            <select id="f-status">
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Blocked">Blocked</option>
              <option value="Done">Done</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="f-due">Due Date &amp; Time *</label>
          <input type="datetime-local" id="f-due" />
        </div>

        <div class="field">
          <label for="f-tags">Tags</label>
          <input
            type="text"
            id="f-tags"
            placeholder="Design, Engineering, Q2"
            autocomplete="off"
          />
          <p class="tags-hint">Comma-separated</p>
        </div>

        <div class="modal-actions">
          <button class="btn-ghost" id="cancelModal">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              aria-hidden="true"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
            Cancel
          </button>
          <button class="btn-primary" id="submitTask">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              aria-hidden="true"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add Task
          </button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <!-- SVG SPRITE -->
    <svg
      xmlns="http://www.w3.org/2000/svg"
      style="display: none"
      aria-hidden="true"
    >
      <symbol
        id="ic-high"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </symbol>
      <symbol
        id="ic-medium"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="18" y1="20" x2="18" y2="10" />
        <line x1="12" y1="20" x2="12" y2="4" />
        <line x1="6" y1="20" x2="6" y2="14" />
      </symbol>
      <symbol
        id="ic-low"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="12" y1="5" x2="12" y2="19" />
        <polyline points="19 12 12 19 5 12" />
      </symbol>
      <symbol
        id="ic-pending"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      >
        <circle cx="12" cy="12" r="10" />
      </symbol>
      <symbol
        id="ic-inprogress"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      >
        <path
          d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"
        />
      </symbol>
      <symbol
        id="ic-done"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
        <polyline points="22 4 12 14.01 9 11.01" />
      </symbol>
      <symbol
        id="ic-blocked"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="10" />
        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" />
      </symbol>
      <symbol
        id="ic-clock"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      >
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </symbol>
      <symbol
        id="ic-overdue"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"
        />
        <line x1="12" y1="9" x2="12" y2="13" />
        <line x1="12" y1="17" x2="12.01" y2="17" />
      </symbol>
      <symbol
        id="ic-cal"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      >
        <rect x="3" y="4" width="18" height="18" rx="2" />
        <line x1="16" y1="2" x2="16" y2="6" />
        <line x1="8" y1="2" x2="8" y2="6" />
        <line x1="3" y1="10" x2="21" y2="10" />
      </symbol>
      <symbol
        id="ic-tag"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"
        />
        <line x1="7" y1="7" x2="7.01" y2="7" />
      </symbol>
      <symbol
        id="ic-edit"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
      </symbol>
      <symbol
        id="ic-trash"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="3 6 5 6 21 6" />
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
        <path d="M10 11v6M14 11v6" />
        <path d="M9 6V4h6v2" />
      </symbol>
      <symbol
        id="ic-caret"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="6 9 12 15 18 9" />
      </symbol>
      <symbol
        id="ic-expand"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="6 9 12 15 18 9" />
      </symbol>
      <symbol
        id="ic-save"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"
        />
        <polyline points="17 21 17 13 7 13 7 21" />
        <polyline points="7 3 7 8 15 8" />
      </symbol>
      <symbol
        id="ic-cancel"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      >
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </symbol>
    </svg>

    <script src="main.js"></script>
  </body>
</html>
